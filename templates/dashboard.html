<!DOCTYPE html>
<html>

<head>

<title>AI Marketing Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:30px;

}

.card{

background:white;

padding:20px;

border-radius:10px;

box-shadow:0 4px 10px rgba(0,0,0,0.1);

}

.insights{

grid-column:1/3;

background:#1e293b;

color:white;

padding:20px;

border-radius:10px;

}

</style>

</head>

<body>

<h1>AI Marketing Analysis</h1>

<div class="grid">

<div class="card">
{{ heatmap | safe }}
</div>

<div class="card">
{{ hist | safe }}
</div>

<div class="card">
{{ box | safe }}
</div>

<div class="card">
{{ scatter | safe }}
</div>

<div class="card">
{{ cluster | safe }}
</div>

<div class="card">
{{ pca3 | safe }}
</div>

<div class="card">
{{ importance | safe }}
</div>

<div class="card">
{{ outliers | safe }}
</div>

<div class="card">
{{ trend | safe }}
</div>

<div class="card">
{{ error | safe }}
</div>

<div class="insights">

<h2>AI Insights</h2>

<p>{{ insights | safe }}</p>

</div>

</div>

</body>

</html>
